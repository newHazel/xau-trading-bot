fvg_min_atr_ratio: 0.3
eqh_eql_tolerance_atr_ratio: 0.15
sweep_requires_close_back_inside: true
premium_discount_midpoint: 0.5
ob_required: false
dxy_required: false
displacement:
  enabled: true
  atr_period: 14
  min_body_atr_multiplier: 1.2
  strong_body_atr_multiplier: 1.5
  min_body_to_range_ratio: 0.60
  strong_body_to_range_ratio: 0.65
  breakout_lookback_candles: 5
  require_close_outside_range: true
  use_volume_if_available: false
  volume_ma_period: 20
  min_volume_multiplier: 1.2
mitigation:
  wick_touch_counts_as: "tapped"
  close_inside_counts_as: "partial"
  full_mitigation_fill_percent: 0.80
  max_allowed_fill_percent_for_live: 0.50
  invalidate_if_close_beyond_zone: true
fvg_touch_rules:
  max_touches_for_backtest: 2
  max_touches_for_paper: 1
  max_touches_for_live: 1
  wick_touch_is_touch: true
  close_inside_is_stronger_touch: true
  reject_after_second_touch: true
sweep:
  require_wick_beyond_level: true
  require_close_back_inside: true
  confirmation_window_candles: 5
  min_wick_penetration_atr_multiplier: 0.05
  require_micro_choch_after_sweep: true
  allow_displacement_as_confirmation: true
  reject_if_no_confirmation_after_window: true
zone_freshness:
  max_minutes_in_zone_before_decay: 15
  decay_grade_after_minutes: true
  invalidate_after_minutes: 60

# --- FVG selection: prefer fresh + near zones, re-pin periodically -----------
# Picks the best tradeable FVG by proximity (ATR-normalized distance to price)
# and freshness (bars since the gap formed), instead of always the newest one.
# Far/old zones are penalized, NOT discarded (still used if nothing better).
# The captured zone is re-evaluated every fvg_repin_interval_bars so the engine
# never stays stuck on a stale gap waiting for an impossible retrace.
# Set fvg_freshness_enabled: false to restore the legacy "newest-first" behavior.
fvg_freshness_enabled: true
fvg_distance_weight: 1.0            # weight on proximity-to-price (ATR units)
fvg_age_weight: 0.5                 # weight on freshness (bars since formed)
fvg_max_distance_atr: 4.0           # zones farther than this are heavily penalized
fvg_max_age_bars: 120              # zones older than this are heavily penalized
fvg_repin_interval_bars: 5          # re-evaluate the pinned zone every N bars
fvg_repin_min_improvement_points: 8.0  # only re-pin if the new zone is this much nearer

# --- Entry confirmation: require a REAL rejection at the zone (#6) --------------
# The final confirmation step requires price to TAG the pinned FVG and CLOSE BACK
# OUT of it in-direction (a true rejection), not merely print a same-colour candle.
# Prevents firing mid-move before price actually reaches/rejects the zone.
# Set false to restore the legacy body-colour-only confirmation.
require_zone_rejection: true
