# F10: account size used to size the suggested lot in alerts. Set this to YOUR real
# balance so the lot_size shown is correct for your account (alerts only — no auto-trade).
account_balance: 10000.0
# Loosen v2 (2026-06-12): turned OFF after the no_killzone backtest showed win% 21% —
# the brute "any-time" version is too low-win% for psychological survival. Replaced by
# EXPANDING the kill-zone definition in config/sessions.yaml (Sydney+Tokyo+full London+
# full NY all = active sessions). The session filter still enforces "trade an active
# session" — only the dead 00:00-01:00 IL window is skipped. Flip to true to fully
# bypass the gate again (NOT recommended).
ignore_kill_zone: false
# Price-sanity gate (2026-06-16): DON'T fire a signal whose SL is ALREADY breached by
# the current price (dead-on-arrival — the entry is stale/unreachable, e.g. the 06-16
# 05:35 long whose price had already dropped below the SL). Backtest Apr-Jun: removed
# 6/68 DOA signals with PF/win%/R UNCHANGED (1.52) — harmless in backtest (the entry-
# trigger already drops them there), but in LIVE it stops un-actionable alerts + fake
# tracker losses. A genuine correctness fix → ON.
price_sanity_gate: true
risk_per_trade_percent: 0.5
max_risk_per_trade_percent: 1.0
max_daily_losses: 2
max_daily_trades: 3
stop_after_tp: true
rr_tiers:
  min_to_enter: 2.0
  required_for_grade_b: 1.5
  required_for_grade_a: 2.0
  required_for_grade_a_plus: 2.5
tp1_r: 2.0
tp2_r: 3.5
require_liquidity_target_for_tp2: true
# Forward OutcomeTracker (+ backtest entry-trigger): a limit entry that price never
# trades through within this many bars is EXPIRED (no trade), not a loss. Same value the
# backtest uses, so the live forward record matches backtest/label methodology.
entry_trigger_expiry_bars: 12
atr_period: 14
atr_sl_multiplier: 1.5
swing_buffer_atr_ratio: 0.20
sl_invalidation_mode: "min_of_sweep_and_fvg"  # sweep_low / fvg_bottom / min_of_sweep_and_fvg / swing_low
sl_buffer_atr_ratio: 0.20
re_entry:
  allow_after_sl: false
  allow_after_tp: false
  require_new_setup_id: true
  require_new_sweep: true
  cooldown_minutes_after_loss: 60
